name: Update stock signature

on:
  workflow_dispatch:
  schedule:
    # GitHub's shortest supported scheduled interval is 5 minutes.
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: stock-signature-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow
        run: python -m pip install --disable-pip-version-check pillow==11.3.0

      - name: Generate PNG
        run: python generate_signature.py

      - name: Commit changed image
        run: |
          if git diff --quiet -- stock_signature.png; then
            echo "No image change."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stock_signature.png
          git commit -m "Update stock signature"
          git push
