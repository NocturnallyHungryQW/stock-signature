name: Update and publish stock signature

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: stock-signature-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install image library
        run: python -m pip install --disable-pip-version-check Pillow==11.3.0

      - name: Generate signature image
        run: python generate_signature.py

      - name: Save updated PNG to repository
        run: |
          if git diff --quiet -- stock_signature.png; then
            echo "The quote image did not change."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add stock_signature.png
            git commit -m "Update stock quote signature"
            git push
          fi

      - name: Create GitHub Pages files
        run: |
          mkdir -p public
          cp stock_signature.png public/stock_signature.png
          touch public/.nojekyll

          cat > public/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
            <meta http-equiv="pragma" content="no-cache">
            <meta http-equiv="expires" content="0">
            <title>Stock Signature</title>
            <style>
              html, body {
                margin: 0;
                padding: 12px;
                background: #111216;
              }

              img {
                display: block;
                max-width: 100%;
                height: auto;
              }
            </style>
          </head>
          <body>
            <img src="stock_signature.png" alt="Stock quotes">
          </body>
          </html>
          HTML

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages files
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Publish GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
