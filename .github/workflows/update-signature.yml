name: Update stock signature

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: update-stock-signature
  cancel-in-progress: true

jobs:
  update-image:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install image library
        run: python -m pip install --disable-pip-version-check Pillow==11.3.0

      - name: Generate signature image
        run: python generate_signature.py

      - name: Save updated image
        run: |
          if git diff --quiet -- stock_signature.png; then
            echo "The quote image did not change."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add stock_signature.png
          git commit -m "Update stock quote signature"
          git push
